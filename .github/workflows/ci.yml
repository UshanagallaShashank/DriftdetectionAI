name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  autofix:
    name: Auto-fix & commit
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: needs.changes.outputs.backend == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Fix backend (ruff)
        if: needs.changes.outputs.backend == 'true'
        run: pip install ruff && ruff check backend/app --fix --exit-zero

      - name: Fix frontend (eslint)
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci && npx eslint src --fix

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix(lint): auto-fix formatting"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  quality:
    name: Code quality checks
    needs: [changes, autofix]
    if: always() && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') && needs.autofix.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Enforce 30-line file limit
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 30 ]; then
              echo "FAIL: $file — $lines lines (max 30)"
              fail=1
            fi
          done < <(find backend/app frontend/src \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" \) -print0 2>/dev/null)
          exit $fail

  backend:
    name: Backend — lint & test
    needs: [changes, autofix]
    if: always() && needs.changes.outputs.backend == 'true' && needs.autofix.result != 'failure'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app

      - name: Test (pytest)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest -v

  frontend:
    name: Frontend — lint, type-check, test & build
    needs: [changes, autofix]
    if: always() && needs.changes.outputs.frontend == 'true' && needs.autofix.result != 'failure'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: Frontend — E2E (Playwright)
    needs: [changes, autofix]
    if: always() && needs.changes.outputs.frontend == 'true' && needs.autofix.result != 'failure'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: frontend/test-results/
