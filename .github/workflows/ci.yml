name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  autofix:
    name: Auto-fix & commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend tools
        run: pip install ruff

      - name: Install frontend tools
        working-directory: frontend
        run: npm ci

      - name: Fix backend (ruff)
        run: ruff check backend/app --fix --exit-zero

      - name: Fix frontend (eslint)
        working-directory: frontend
        run: npx eslint src --fix

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix(lint): auto-fix formatting"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  quality:
    name: Code quality checks
    needs: autofix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Enforce 30-line file limit
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 30 ]; then
              echo "FAIL: $file — $lines lines (max 30)"
              fail=1
            fi
          done < <(find backend/app frontend/src \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" \) -print0 2>/dev/null)
          exit $fail

  backend:
    name: Backend — lint & test
    needs: autofix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app

      - name: Test (pytest)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest -v

  frontend:
    name: Frontend — lint, type-check, test & build
    needs: autofix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build
